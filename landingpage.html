    <style>
        :root {
            --midnight-blue: #0a192f;
            --electric-gold: #ffd700;
            --neon-blue: #00f3ff;
            --silver: #c0c0c0;
            --dark-space: #020c1b;
            --neon-glow: 0 0 10px rgba(0, 243, 255, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-size: small;
        }

        body {
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            color: white;
            background-color: var(--dark-space);
            line-height: 1.6;
            padding-top: 80px; /* Added for fixed navbar */
        }

        /* ===== FIXED NAVIGATION ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 25, 47, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            padding: 20px 5%;
            transition: all 0.3s ease;
            border-bottom: 1px solid rgba(0, 243, 255, 0.1);
        }

        .navbar.scrolled {
            padding: 15px 5%;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--electric-gold);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span {
            background: linear-gradient(90deg, var(--electric-gold), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 1.5rem;
            margin: 0;
            padding: 0;
        }

        .nav-link {
            color: var(--silver);
            text-decoration: none;
            padding: 8px 0;
            position: relative;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-link:hover {
            color: var(--electric-gold);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--electric-gold), var(--neon-blue));
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* Mobile Menu Button */
        .hamburger {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            z-index: 1001;
        }

        .hamburger span {
            display: block;
            width: 25px;
            height: 3px;
            background: var(--electric-gold);
            margin: 5px 0;
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        /* Mobile Styles */
        @media (max-width: 768px) {
            body {
                padding-top: 70px;
            }
            
            .navbar {
                padding: 15px 5%;
            }
            
            .hamburger {
                display: block;
            }
            
            .hamburger.active span:nth-child(1) {
                transform: rotate(45deg) translate(6px, 6px);
            }
            
            .hamburger.active span:nth-child(2) {
                opacity: 0;
            }
            
            .hamburger.active span:nth-child(3) {
                transform: rotate(-45deg) translate(7px, -6px);
            }
            
            .nav-menu {
                position: fixed;
                top: 70px;
                left: -100%;
                width: 100%;
                background: rgba(10, 25, 47, 0.95);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                flex-direction: column;
                align-items: center;
                padding: 30px 0;
                gap: 20px;
                transition: left 0.3s ease;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                border-top: 1px solid rgba(0, 243, 255, 0.1);
                z-index: 999;
            }
            
            .nav-menu.active {
                left: 0;
            }
            
            .nav-link {
                font-size: 1.1rem;
                padding: 10px 20px;
            }
            
            .nav-link::after {
                width: calc(100% - 40px);
                left: 20px;
            }
        }

        /* Page Header */
        .page-header {
            padding: 120px 0 80px;
            background: linear-gradient(135deg, rgba(10, 25, 47, 0.9), rgba(2, 12, 27, 0.95)), 
                        url('https://images.pexels.com/photos/3769021/pexels-photo-3769021.jpeg');
            background-size: cover;
            background-position: center;
            text-align: center;
        }

        @media (max-width: 768px) {
            .page-header {
                padding: 100px 0 60px;
            }
        }

        .page-header h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: 20px;
            color: var(--electric-gold);
        }

        .page-header p {
            max-width: 700px;
            margin: 0 auto;
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: var(--silver);
        }

        /* Service Highlight */
        .service-highlight {
            padding: 80px 0;
            background-color: var(--midnight-blue);
        }

        @media (max-width: 768px) {
            .service-highlight {
                padding: 60px 0;
            }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .service-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            transition: all 0.5s ease;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 243, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .service-card {
                padding: 30px 20px;
                margin: 0 10px;
            }
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--electric-gold), var(--neon-blue));
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .service-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0, 243, 255, 0.2);
            border-color: rgba(0, 243, 255, 0.3);
        }

        @media (max-width: 768px) {
            .service-card:hover {
                transform: translateY(-5px);
            }
        }

        .service-card:hover::before {
            opacity: 0.3;
        }

        .service-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 243, 255, 0.1);
            border-radius: 50%;
            font-size: 30px;
            color: var(--electric-gold);
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            .service-icon {
                width: 70px;
                height: 70px;
                font-size: 26px;
                margin-bottom: 20px;
            }
        }

        .service-card:hover .service-icon {
            background: var(--electric-gold);
            color: var(--midnight-blue);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .service-card h2 {
            font-size: clamp(1.5rem, 3vw, 2rem);
            margin-bottom: 20px;
            color: white;
        }

        .service-card h3 {
            font-size: clamp(1.2rem, 2vw, 1.5rem);
            margin-bottom: 15px;
            color: var(--electric-gold);
        }

        .service-card p {
            color: var(--silver);
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .service-card p {
                font-size: 1rem;
                line-height: 1.6;
                margin-bottom: 25px;
            }
        }

        .btn {
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1rem;
            cursor: pointer;
            display: inline-block;
            border: none;
        }

        .btn-primary {
            background-color: var(--electric-gold);
            color: var(--midnight-blue);
            border: 2px solid var(--electric-gold);
        }

        .btn-primary:hover {
            background-color: transparent;
            color: var(--electric-gold);
            box-shadow: var(--neon-glow);
        }

        /* Benefits Section */
        .benefits {
            padding: 80px 0;
            background-color: var(--dark-space);
        }

        @media (max-width: 768px) {
            .benefits {
                padding: 60px 0;
            }
        }

        .section-header {
            text-align: center;
            margin-bottom: 50px;
        }

        @media (max-width: 768px) {
            .section-header {
                margin-bottom: 40px;
            }
        }

        .section-header h2 {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            color: white;
            margin-bottom: 15px;
            position: relative;
            display: inline-block;
        }

        .section-header h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: var(--electric-gold);
        }

        .section-header p {
            color: var(--silver);
            max-width: 700px;
            margin: 20px auto 0;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
        }

        .benefits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        @media (max-width: 768px) {
            .benefits-grid {
                grid-template-columns: 1fr;
                gap: 20px;
                padding: 0 10px;
            }
        }

        .benefit-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 30px;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 243, 255, 0.1);
        }

        @media (max-width: 768px) {
            .benefit-card {
                padding: 25px 20px;
            }
        }

        .benefit-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0, 243, 255, 0.1);
            border-color: rgba(0, 243, 255, 0.3);
        }

        @media (max-width: 768px) {
            .benefit-card:hover {
                transform: translateY(-3px);
            }
        }

        .benefit-card i {
            font-size: 2.5rem;
            color: var(--electric-gold);
            margin-bottom: 20px;
            display: inline-block;
        }

        @media (max-width: 768px) {
            .benefit-card i {
                font-size: 2rem;
                margin-bottom: 15px;
            }
        }

        .benefit-card h3 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: white;
        }

        @media (max-width: 768px) {
            .benefit-card h3 {
                font-size: 1.2rem;
                margin-bottom: 10px;
            }
        }

        .benefit-card p {
            color: var(--silver);
            font-size: 1rem;
            line-height: 1.6;
        }

        /* Portfolio Showcase */
        .portfolio {
            padding: 80px 0;
            background-color: var(--midnight-blue);
        }

        @media (max-width: 768px) {
            .portfolio {
                padding: 60px 0;
            }
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        @media (max-width: 768px) {
            .portfolio-grid {
                grid-template-columns: 1fr;
                gap: 20px;
                margin-top: 40px;
                padding: 0 10px;
            }
        }

        .portfolio-item {
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            height: 250px;
            transition: all 0.3s ease;
        }

        .portfolio-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .portfolio-item:hover img {
            transform: scale(1.1);
        }

        .portfolio-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 25, 47, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: 20px;
            text-align: center;
        }

        .portfolio-item:hover .portfolio-overlay {
            opacity: 1;
        }

        .portfolio-overlay h3 {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .portfolio-overlay h3 {
                font-size: 1.3rem;
            }
        }

        .portfolio-overlay p {
            color: var(--silver);
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .portfolio-overlay a {
            color: var(--electric-gold);
            text-decoration: none;
            font-weight: 600;
            margin-top: 10px;
            display: inline-flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        .portfolio-overlay a:hover {
            color: var(--neon-blue);
        }

        .portfolio-overlay a i {
            margin-left: 5px;
            transition: transform 0.3s ease;
        }

        .portfolio-overlay a:hover i {
            transform: translateX(5px);
        }

        /* CTA Section */
        .cta-section {
            padding: 80px 0;
            text-align: center;
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.05) 0%, rgba(2, 12, 27, 0.9) 100%);
        }

        @media (max-width: 768px) {
            .cta-section {
                padding: 60px 0;
            }
        }

        .cta-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .cta-content h2 {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            margin-bottom: 20px;
            color: white;
        }

        .cta-content p {
            color: var(--silver);
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            margin-bottom: 30px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Footer */
        footer {
            background-color: var(--dark-space);
            padding: 40px 0 20px;
            text-align: center;
            border-top: 1px solid rgba(0, 243, 255, 0.1);
        }

        .footer-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 768px) {
            .footer-links {
                gap: 15px;
                flex-direction: column;
            }
        }

        .footer-links a {
            color: var(--silver);
            text-decoration: none;
            transition: color 0.3s ease;
            font-size: 0.95rem;
        }

        .footer-links a:hover {
            color: var(--electric-gold);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .social-links a {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--silver);
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }

        .social-links a:hover {
            background: var(--electric-gold);
            color: var(--midnight-blue);
            transform: translateY(-3px);
        }

        .copyright {
            color: var(--silver);
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* WhatsApp Button */
        .whatsapp-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            background: #25D366;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            z-index: 999;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .whatsapp-float:hover {
            background: #128C7E;
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
        }

        @media (max-width: 768px) {
            .whatsapp-float {
                width: 55px;
                height: 55px;
                font-size: 28px;
                bottom: 20px;
                right: 20px;
            }
        }

        @media (max-width: 576px) {
            .whatsapp-float {
                width: 50px;
                height: 50px;
                font-size: 25px;
                bottom: 15px;
                right: 15px;
            }
        }

        /* Smooth scrolling for anchor links */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Mobile menu toggle
            const hamburger = document.querySelector('.hamburger');
            const navMenu = document.querySelector('.nav-menu');
            
            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                navMenu.classList.toggle('active');
                document.body.style.overflow = navMenu.classList.contains('active') ? 'hidden' : '';
            });
            
            // Close mobile menu when clicking a link
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', () => {
                    hamburger.classList.remove('active');
                    navMenu.classList.remove('active');
                    document.body.style.overflow = '';
                });
            });
            
            // Navbar scroll effect
            const navbar = document.querySelector('.navbar');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 50) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            });
            
            // Smooth scrolling for anchor links
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function(e) {
                    const href = this.getAttribute('href');
                    
                    // Don't prevent default for links to other pages
                    if (href.includes('.html')) return;
                    
                    e.preventDefault();
                    
                    const targetId = href;
                    if (targetId === '#') return;
                    
                    const targetElement = document.querySelector(targetId);
                    if (targetElement) {
                        window.scrollTo({
                            top: targetElement.offsetTop - 80,
                            behavior: 'smooth'
                        });
                        
                        // Close mobile menu if open
                        hamburger.classList.remove('active');
                        navMenu.classList.remove('active');
                        document.body.style.overflow = '';
                    }
                });
            });
            
            // Handle portfolio item hover effects on touch devices
            const portfolioItems = document.querySelectorAll('.portfolio-item');
            
            portfolioItems.forEach(item => {
                item.addEventListener('touchstart', function() {
                    this.classList.add('hover');
                });
                
                item.addEventListener('touchend', function() {
                    setTimeout(() => {
                        this.classList.remove('hover');
                    }, 150);
                });
            });
        });
    </script>
